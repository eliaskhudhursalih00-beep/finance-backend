name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: finance_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/finance_test?sslmode=disable
          JWT_SECRET: testsecret
          JWT_REFRESH_SECRET: testrefreshsecret
        run: npx ts-node migrate.js

      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/finance_test?sslmode=disable
          JWT_SECRET: testsecret
          JWT_REFRESH_SECRET: testrefreshsecret
        run: npm test